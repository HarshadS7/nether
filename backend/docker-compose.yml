version: '3.8'

services:
  neo4j:
    image: neo4j:latest
    container_name: kachow-neo4j
    ports:
      - "7474:7474"  # HTTP
      - "7687:7687"  # Bolt
    environment:
      - NEO4J_AUTH=neo4j/123456778
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_security_procedures_unrestricted=apoc.*
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    networks:
      - kachow-network
    healthcheck:
      test: ["CMD", "cypher-shell", "-u", "neo4j", "-p", "123456778", "RETURN 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  chroma:
    image: chromadb/chroma:latest
    container_name: kachow-chroma
    ports:
      - "8000:8000"
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - kachow-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongo:
    image: mongo:latest
    container_name: kachow-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    networks:
      - kachow-network
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Uncomment to run backend in Docker as well
  # backend:
  #   build: .
  #   container_name: kachow-backend
  #   ports:
  #     - "5000:5000"
  #   environment:
  #     - NODE_ENV=development
  #     - NEO4J_URI=bolt://neo4j:7687
  #     - NEO4J_USER=neo4j
  #     - NEO4J_PASSWORD=kachow123
  #     - CHROMA_HOST=chroma
  #     - CHROMA_PORT=8000
  #     - OPENAI_API_KEY=${OPENAI_API_KEY}
  #   depends_on:
  #     neo4j:
  #       condition: service_healthy
  #     chroma:
  #       condition: service_healthy
  #   networks:
  #     - kachow-network

networks:
  kachow-network:
    driver: bridge

volumes:
  neo4j_data:
  neo4j_logs:
  chroma_data:
  mongo_data:
